<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Tessa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <svg width="300" height="150">
      <g stroke-width="2" fill="none">
        <g stroke="#961ffd">
          <path d="M0 50 L200 50"></path>
          <circle cx="210" cy="50" r="10"></circle>
        </g>
        <g stroke="#0088ff">
          <path d="M0 75 L150 75"></path>
          <circle cx="157.5" cy="75" r="7.5"></circle>
        </g>
        <g stroke="#11C6F8">
          <path d="M0 100 L100 100"></path>
          <circle cx="105" cy="100" r="5"></circle>
        </g>
      </g>
    </svg>
    <div class="introContainer">
      <div class="titleContainer">
        <div>
          <h3>Hi, I'm</h3>
          <h1 class="title1">Tessa</h1>
          <h3>I mess about</h3>
          <h1 class="title2">programming</h1>
        </div>
      </div>
      <div class="laptopContainer">
        <div>
          <img class="laptopImg" src="img/laptop.png" />
          <svg class="laptopSvg" width="300" height="200">
            <g stroke-width="2" fill="none">
              <g stroke="#961ffd">
                <path d="M0 50 L200 50"></path>
                <circle cx="210" cy="50" r="10"></circle>
              </g>
              <g stroke="#0088ff">
                <path d="M0 75 L150 75"></path>
                <circle cx="157.5" cy="75" r="7.5"></circle>
              </g>
            </g>
          </svg>
        </div>
      </div>
    </div>
